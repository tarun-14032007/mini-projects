<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&family=Roboto&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Student Grade Calculator</h1>

        <div class="form-section">
            <label>Subject 1:</label>
            <input type="number" id="m1" min="0" max="100"><br>

            <label>Subject 2:</label>
            <input type="number" id="m2" min="0" max="100"><br>

            <label>Subject 3:</label>
            <input type="number" id="m3" min="0" max="100"><br>

            <label>Subject 4:</label>
            <input type="number" id="m4" min="0" max="100"><br>

            <label>Subject 5:</label>
            <input type="number" id="m5" min="0" max="100"><br>

            <button id="calcBtn" 
                onclick="calculateGrade()" 
                onmouseover="hoverEffect()" 
                onmouseout="removeHover()">
                Calculate
            </button>

            <button onclick="resetForm()">Reset</button>
        </div>

        <div class="result-section">
            <h2>Total: <span id="total"></span></h2>
            <h2>Average: <span id="average"></span></h2>
            <h2>Grade: <span id="grade"></span></h2>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
