<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1>&#127891; Student Grade Calculator</h1>

        <div class="input-group">
            <label>Subject 1</label>
            <input type="number" id="m1" min="0" max="100" placeholder="Enter marks (0-100)">
        </div>

        <div class="input-group">
            <label>Subject 2</label> 
            <input type="number" id="m2" min="0" max="100" placeholder="Enter marks (0-100)">
        </div>

        <div class="input-group">
            <label>Subject 3</label>
            <input type="number" id="m3" min="0" max="100" placeholder="Enter marks (0-100)">
        </div>

        <div class="input-group">
            <label>Subject 4</label>
            <input type="number" id="m4" min="0" max="100" placeholder="Enter marks (0-100)">
        </div>

        <div class="input-group">
            <label>Subject 5</label>
            <input type="number" id="m5" min="0" max="100" placeholder="Enter marks (0-100)">
        </div>

        <div class="btn-group">
            <button id="calcBtn"
                onclick="calculateGrade()"
                onmouseover="hoverEffect()"
                onmouseout="removeHover()">
                Calculate
            </button>

            <button class="reset-btn" onclick="resetForm()">Reset</button>
        </div>

        <div class="result-box">
            <p>Total: <span id="total">-</span></p>
            <p>Average: <span id="average">-</span></p>
            <p>Grade: <span id="grade">-</span></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
